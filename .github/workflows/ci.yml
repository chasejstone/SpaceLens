name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check syntax
        run: python -m compileall -q SpaceLens_SOTA.py benchmark_spacelens_sota.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
